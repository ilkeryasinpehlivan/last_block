<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Last Block: Endless Puzzle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <script>
        console.log("Startup: Core scripts loading...");
        window.onerror = function (msg, url, line, col, error) {
            console.error("GLOBAL JS Error: " + msg + " at " + url + ":" + line);
            alert("JS Error: " + msg);
            return false;
        };
    </script>
    <div id="app" class="app-container">
        <!-- Main Screen Wrapper (Fills 1fr) -->
        <main class="screens-wrapper">

            <!-- Main Menu -->
            <section id="menu-screen" class="screen active">
                <div class="menu-content-wrapper">
                    <h1 class="game-title">LAST<br><span>BLOCK</span></h1>
                    <div class="menu-buttons">
                        <button id="start-btn" class="btn btn-primary">OYUNA BAŞLA</button>
                        <button id="settings-btn" class="btn btn-secondary">AYARLAR</button>
                    </div>
                    <div class="high-score-container">
                        <div class="high-score-label">EN YÜKSEK SKOR</div>
                        <div class="high-score-line"></div>
                        <div id="menu-high-score" class="high-score-value">0</div>
                    </div>
                </div>
                <!-- Bottom Decorative Grid -->
                <div class="menu-bottom-grid"></div>
            </section>

            <!-- Game Screen -->
            <section id="game-screen" class="screen">
                <header class="game-header">
                    <div class="stat-box">
                        <span class="stat-label">SKOR</span>
                        <span id="current-score" class="stat-value">0</span>
                    </div>

                    <button id="game-home-btn" class="icon-btn">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path fill="currentColor" d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z" />
                        </svg>
                    </button>

                    <div class="stat-box">
                        <span class="stat-label">SÜRE</span>
                        <span id="game-timer" class="stat-value">00:00</span>
                    </div>
                </header>

                <div id="game-container">
                    <canvas id="game-canvas"></canvas>
                </div>
                <div class="rotation-hint">
                    <span>Dokunarak Döndür • Sürükleyerek Yerleştir</span>
                </div>
                <div id="piece-inventory" class="piece-tray">
                    <div class="inventory-slot" data-index="0"></div>
                    <div class="inventory-slot" data-index="1"></div>
                    <div class="inventory-slot" data-index="2"></div>
                </div>
            </section>

            <!-- Game Over Screen -->
            <section id="game-over-screen" class="screen">
                <div class="overlay-content">
                    <h2 class="title-red">EYVAH!</h2>
                    <div class="final-stats">
                        <p>Skor: <span id="final-score">0</span></p>
                        <p>En Yüksek: <span id="final-high-score">0</span></p>
                    </div>
                    <div class="rewarded-ad-container" style="margin-bottom: 20px; width: 100%;">
                        <button id="watch-ad-btn" class="btn btn-rewarded" style="width: 100%;">
                            🎥 REKLAM İZLE VE DEVAM ET
                        </button>
                    </div>
                    <div class="game-over-buttons"
                        style="display: flex; flex-direction: column; gap: 10px; width: 100%;">
                        <button id="restart-btn" class="btn btn-primary">YENİDEN BAŞLA</button>
                        <button id="home-btn" class="btn btn-secondary">ANA MENÜ</button>
                    </div>
                </div>
            </section>

            <!-- Settings Screen -->
            <section id="settings-screen" class="screen">
                <div class="overlay-content">
                    <h2 style="margin-bottom: 20px;">AYARLAR</h2>
                    <div class="settings-list">
                        <div class="setting-item">
                            <span id="label-lang">DİL</span>
                            <div class="lang-toggle-group">
                                <button id="lang-tr-btn" class="lang-btn active">TR</button>
                                <button id="lang-en-btn" class="lang-btn">EN</button>
                            </div>
                        </div>
                        <div class="setting-item">
                            <span id="label-sound">SES</span>
                            <label class="switch">
                                <input type="checkbox" id="sound-toggle" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="setting-item">
                            <span id="label-music">MÜZİK</span>
                            <label class="switch">
                                <input type="checkbox" id="music-toggle" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="setting-item">
                            <span id="label-vibe">TİTREŞİM</span>
                            <label class="switch">
                                <input type="checkbox" id="vibe-toggle" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <button id="settings-close-btn" class="btn btn-secondary" style="width: 100%;">GERİ</button>
                </div>
            </section>
        </main>

        </footer>

        <!-- Custom Confirmation Modal -->
        <div id="custom-modal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-icon">
                    <svg viewBox="0 0 24 24" width="48" height="48">
                        <path fill="currentColor"
                            d="M11,15H13V17H11V15M11,7H13V13H11V7M12,2C6.47,2 2,6.47 2,12C2,17.53 6.47,22 12,22C17.53,22 22,17.53 22,12C22,6.47 17.53,2 12,2M12,20C7.59,20 4,16.41 4,12C4,7.59 7.59,4 12,4C16.41,4 20,7.59 20,12C20,16.41 16.41,20 12,20Z" />
                    </svg>
                </div>
                <h3 id="modal-title">ONAY</h3>
                <p id="modal-message">Oyundan çıkmak istiyor musunuz?</p>
                <div class="modal-buttons">
                    <button id="modal-cancel-btn" class="btn btn-secondary">İPTAL</button>
                    <button id="modal-confirm-btn" class="btn btn-primary">EVET</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="storage.js"></script>
    <script src="effects.js"></script>
    <script src="ui.js"></script>
    <script src="game.js"></script>
    <script type="module">
        import { AdManager } from './AdManager.js';

        const initAds = async () => {
            try {
                await AdManager.initialize();
                console.log("AdMob Initialized");
            } catch (e) {
                console.error("AdMob Init Failed", e);
            }
        };

        if (document.readyState === 'complete') initAds();
        else window.addEventListener('load', initAds);
    </script>
</body>

</html>
